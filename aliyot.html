<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>עליות לתורה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Heebo',sans-serif;background:#f5f0e8;color:#2d1a0a;min-height:100vh;padding-bottom:80px;}
  header{background:linear-gradient(135deg,#2d1a0a,#4a2e15);color:#e8c87a;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  header h1{font-size:1.5rem;font-weight:900;letter-spacing:2px;}
  header p{font-size:.8rem;color:rgba(232,200,122,.6);margin-top:2px;}
  .container{padding:16px;}
  .card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(45,26,10,.1);border:1px solid rgba(200,164,74,.2);}
  .card-title{font-size:.9rem;font-weight:900;color:#8b6914;margin-bottom:12px;letter-spacing:1px;}
  label{display:block;font-size:.8rem;font-weight:700;color:#5c3f08;margin-bottom:4px;margin-top:10px;}
  label:first-of-type{margin-top:0;}
  input[type=text],input[type=date]{width:100%;padding:11px 14px;border:2px solid #ddd0b0;border-radius:10px;font-family:'Heebo',sans-serif;font-size:1rem;color:#2d1a0a;background:#fafaf8;outline:none;transition:border .2s;}
  input:focus{border-color:#c8a44a;}
  input[readonly]{background:#f5f0e8;color:#8b6914;font-weight:700;}
  .btn{width:100%;padding:13px;border:none;border-radius:12px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;margin-top:14px;transition:opacity .2s;}
  .btn:active{opacity:.8;}
  .btn-add{background:linear-gradient(135deg,#c8a44a,#8b6914);color:#fff;}
  .entry{background:#fafaf8;border:1px solid #ddd0b0;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .entry-info{flex:1;}
  .entry-name{font-weight:900;font-size:1rem;color:#2d1a0a;}
  .entry-dates{font-size:.75rem;color:#8b6914;margin-top:2px;}
  .entry-count{background:rgba(200,164,74,.2);border:1px solid #c8a44a;border-radius:12px;padding:2px 10px;font-size:.8rem;font-weight:900;color:#5c3f08;white-space:nowrap;}
  .del-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:6px;border-radius:8px;color:#d32f2f;flex-shrink:0;}
  .del-btn:active{background:#ffebee;}
  .month-header{font-size:.85rem;font-weight:900;color:#8b6914;padding:8px 0 4px;border-bottom:2px solid rgba(200,164,74,.3);margin-bottom:8px;letter-spacing:1px;}
  .empty{text-align:center;padding:40px 20px;color:#8b6914;font-size:1rem;opacity:.7;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d1a0a;color:#e8c87a;padding:10px 24px;border-radius:50px;font-weight:700;font-size:.9rem;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <h1>📖 עליות לתורה</h1>
  <p id="monthLabel"></p>
</header>

<div class="container">
  <div class="card">
    <div class="card-title">➕ הוסף עלייה</div>
    <label>תאריך לועזי</label>
    <input type="date" id="m-date">
    <label>תאריך עברי (מחושב)</label>
    <input type="text" id="m-hdate" readonly placeholder="יחושב אחרי בחירת תאריך">
    <label>שם העולה</label>
    <input type="text" id="m-name" placeholder="ישראל ישראלי" autocomplete="off" list="names-list">
    <datalist id="names-list"></datalist>
    <button class="btn btn-add" id="addBtn">✅ שמור עלייה</button>
  </div>
  <div id="entryList"><div class="empty">טוען...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import{getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyBl99zWeW0SpVWs18P5GlJ-mDPTsiaSgEM",authDomain:"gavlli-board.firebaseapp.com",projectId:"gavlli-board",storageBucket:"gavlli-board.firebasestorage.app",messagingSenderId:"202183123739",appId:"1:202183123739:web:5e2375d9eae0c0202e29be",measurementId:"G-BZMPZXH2PF"});
const db=getFirestore(app);

const HE_MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const now=new Date(),curY=now.getFullYear(),curM=now.getMonth()+1;
document.getElementById('monthLabel').textContent=HE_MONTHS[curM-1]+' '+curY;

const dateInput=document.getElementById('m-date');
const nameInput=document.getElementById('m-name');
const namesList=document.getElementById('names-list');

let _allNames=new Set();

function updateNamesList(docs){
  _allNames=new Set(docs.map(d=>d.name).filter(Boolean));
  namesList.innerHTML=[..._allNames].sort((a,b)=>a.localeCompare(b,'he')).map(n=>`<option value="${n}">`).join('');
}

dateInput.value=now.toISOString().slice(0,10);

async function fetchHebrew(dateStr){
  if(!dateStr) return;
  try{
    const r=await fetch(`https://www.hebcal.com/converter?cfg=json&date=${dateStr}&g2h=1&strict=1`);
    const d=await r.json();
    document.getElementById('m-hdate').value=d.hebrew||'';
  }catch{document.getElementById('m-hdate').value='';}
}

dateInput.addEventListener('change',()=>fetchHebrew(dateInput.value));
fetchHebrew(dateInput.value);

async function addAliya(){
  const date=dateInput.value;
  const name=document.getElementById('m-name').value.trim();
  const hdate=document.getElementById('m-hdate').value.trim();
  if(!date||!name){toast('יש למלא תאריך ושם');return;}
  try{
    await addDoc(collection(db,'aliyot'),{date,name,hebrewDate:hdate,createdAt:serverTimestamp()});
    document.getElementById('m-name').value='';
    toast('נוסף! ✓');
  }catch{toast('שגיאה');}
}

document.getElementById('addBtn').addEventListener('click',addAliya);

onSnapshot(query(collection(db,'aliyot'),orderBy('date','desc')),snap=>{
  const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
  updateNamesList(docs);
  const countMap={};
  docs.forEach(d=>{
    if(!d.date) return;
    const[y,m]=d.date.split('-').map(Number);
    if(y===curY&&m===curM) countMap[d.name]=(countMap[d.name]||0)+1;
  });
  const list=document.getElementById('entryList');
  if(!docs.length){list.innerHTML='<div class="empty">אין עליות עדיין</div>';return;}
  const groups={};
  docs.forEach(d=>{
    const parts=(d.date||'').split('-').map(Number);
    const key=(parts[0]&&parts[1])?`${HE_MONTHS[parts[1]-1]} ${parts[0]}`:'ללא תאריך';
    if(!groups[key]) groups[key]=[];
    groups[key].push(d);
  });
  const DAY_HE=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  if(!window._collapsed) window._collapsed=new Set();
  list.innerHTML=Object.entries(groups).map(([month,items])=>{
    const closed=window._collapsed.has(month);
    return`<div>
      <div class="month-header" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;" data-m="${month}">
        <span>${month} <span style="font-weight:400;opacity:.6;font-size:.9em;">(${items.length})</span></span>
        <span>${closed?'▸':'▾'}</span>
      </div>
      <div style="display:${closed?'none':'block'}">
        ${items.map(d=>{
          const parts=(d.date||'').split('-').map(Number);
          const isCur=parts[0]===curY&&parts[1]===curM;
          const dayName=d.date?DAY_HE[new Date(d.date+'T12:00:00').getDay()]:'';
          return`<div class="entry">
            <div class="entry-info">
              <div class="entry-name">${d.name||''}</div>
              <div class="entry-dates">${dayName} | ${d.hebrewDate||''} | ${d.date||''}</div>
            </div>
            ${isCur?`<span class="entry-count">${countMap[d.name]||1}✕</span>`:''}
            <button class="del-btn" data-id="${d.id}">🗑</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click',async()=>{
    if(!confirm('למחוק?'))return;
    try{await deleteDoc(doc(db,'aliyot',b.dataset.id));toast('נמחק ✓');}
    catch{toast('שגיאה');}
  }));
  list.querySelectorAll('.month-header').forEach(hdr=>hdr.addEventListener('click',()=>toggleMonth(hdr)));
});

function toggleMonth(el){
  const m=el.dataset.m;
  if(window._collapsed.has(m)) window._collapsed.delete(m);
  else window._collapsed.add(m);
  const entries=el.nextElementSibling;
  entries.style.display=window._collapsed.has(m)?'none':'block';
  el.querySelector('span:last-child').textContent=window._collapsed.has(m)?'▸':'▾';
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
</script>
</body>
</html>
