<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>לוח מודעות בית כנסת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  :root { --gold:#c8a44a; --gold-light:#e8c87a; --bg:#1a0e05; --text:#fff8e7; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Frank Ruhl Libre',serif;height:100vh;overflow:hidden;}
  
  /* התראות מועדים ותחנון */
  #top-alert { position:fixed; top:20px; left:20px; z-index:1000; display:flex; flex-direction:column; gap:10px; }
  .alert-box { background:rgba(200,164,74,0.2); border:2px solid var(--gold); padding:10px 20px; border-radius:10px; font-size:1.5rem; color:var(--gold-light); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{opacity:0.8;} 50%{opacity:1;} 100%{opacity:0.8;} }

  .header{display:flex;justify-content:space-between;padding:30px;background:rgba(0,0,0,0.3);border-bottom:2px solid var(--gold);}
  .clock{font-size:5rem;font-weight:900;color:var(--gold-light);}
  .date-info{text-align:left;font-size:2rem;}

  .main-content{height:calc(100vh - 180px);display:flex;align-items:center;justify-content:center;position:relative;}
  .slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:40px;text-align:center;}
  .slide.active{display:flex;}

  .prayer-time-row{font-size:4rem;margin:15px 0;display:flex;gap:40px;border-bottom:1px solid rgba(200,164,74,0.3);width:80%;justify-content:space-between;}
  .omer-circle{width:400px;height:400px;border:10px solid var(--gold);border-radius:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;}
  .omer-num{font-size:12rem;line-height:1;color:var(--gold-light);}
  .omer-label{font-size:3rem;}
</style>
</head>
<body>

<div id="top-alert"></div>

<div class="header">
  <div class="clock" id="clock">00:00</div>
  <div class="date-info">
    <div id="heb-date">טוען תאריך...</div>
    <div id="parasha" style="color:var(--gold);">פרשת השבוע</div>
  </div>
</div>

<div class="main-content">
  <div class="slide active" id="screenA">
    <h2 style="font-size:3rem;color:var(--gold);">זמני תפילות</h2>
    <div id="prayers-list" style="width:100%;display:flex;flex-direction:column;align-items:center;"></div>
  </div>

  <div class="slide" id="screenSpecial">
    <h2 style="font-size:3rem;color:var(--gold);">תפילות נוספות ומיוחדות</h2>
    <div id="special-list-display" style="width:100%;display:flex;flex-direction:column;align-items:center;"></div>
  </div>

  <div class="slide" id="screenC">
    <h2 style="font-size:3rem;color:var(--gold);">שיעורי תורה היום</h2>
    <div id="shiurim-display" style="font-size:3.5rem;"></div>
  </div>

  <div class="slide" id="screenOmer">
    <div class="omer-circle">
      <div class="omer-label">היום</div>
      <div class="omer-num" id="omer-number">?</div>
      <div class="omer-label">לעומר</div>
    </div>
    <div id="omer-hebrew" style="font-size:2.5rem;margin-top:20px;"></div>
  </div>
</div>

<script>
// חובה להדביק כאן את ה-firebaseConfig שלך!
const firebaseConfig = {
    apiKey: "AIzaSyBl99zWeW0SpVWs18P5GlJ-mDPTsiaSgEM",
    authDomain: "gavlli-board.firebaseapp.com",
    projectId: "gavlli-board",
    storageBucket: "gavlli-board.firebasestorage.app",
    messagingSenderId: "202183123739",
    appId: "1:202183123739:web:5e2375d9eae0c0202e29be"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// שעון
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
}, 1000);

// Hebcal & Omer
async function fetchHebcal() {
  try {
    const res = await fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&m=50');
    const data = await res.json();
    document.getElementById('heb-date').textContent = data.hebdate;
    
    // מציאת פרשה ותחנון
    const alertDiv = document.getElementById('top-alert');
    alertDiv.innerHTML = '';
    
    data.items.forEach(item => {
      if(item.category === 'parashat') document.getElementById('parasha').textContent = item.hebrew;
      
      // בדיקת אירועים מיוחדים ותחנון
      if(item.category === 'holiday') {
        alertDiv.innerHTML += `<div class="alert-box">${item.hebrew}</div>`;
        if(item.memo && item.memo.includes("No Tachanun")) {
            alertDiv.innerHTML += `<div class="alert-box" style="background:rgba(255,0,0,0.2)">אין אומרים תחנון</div>`;
        }
      }

      // ספירת העומר - תיקון זיהוי
      if(item.category === 'omer') {
        const day = item.title.match(/\d+/);
        if(day) {
          document.getElementById('omer-number').textContent = day[0];
          document.getElementById('screenOmer').setAttribute('data-active', 'true');
        }
      }
    });
  } catch(e) { console.error(e); }
}
fetchHebcal();

// טעינת תפילות
db.collection('prayer_times').doc('current').onSnapshot(doc => {
  const d = doc.data() || {};
  const list = [];
  if(d.shacharit) list.push(`<span>שחרית</span><span>${d.shacharit}</span>`);
  if(d.mincha) list.push(`<span>מנחה</span><span>${d.mincha}</span>`);
  if(d.arvit) list.push(`<span>ערבית</span><span>${d.arvit}</span>`);
  if(d.hodaya) list.push(`<span>${d.hodaya}</span><span></span>`);
  document.getElementById('prayers-list').innerHTML = list.map(item => `<div class="prayer-time-row">${item}</div>`).join('');
});

// תפילות מיוחדות
db.collection('special_prayers').onSnapshot(snap => {
  const list = snap.docs.map(doc => `
    <div class="prayer-time-row"><span>${doc.data().name}</span><span>${doc.data().time}</span></div>
  `).join('');
  document.getElementById('special-list-display').innerHTML = list;
  document.getElementById('screenSpecial').setAttribute('data-has-content', snap.empty ? 'false' : 'true');
});

// שיעורים
db.collection('shiurim').onSnapshot(snap => {
  const today = new Date().getDay() + 1;
  const list = snap.docs
    .filter(doc => doc.data().day === 0 || doc.data().day === today)
    .map(doc => `<div style="margin-bottom:20px;">${doc.data().title} - <b>${doc.data().time}</b></div>`)
    .join('');
  document.getElementById('shiurim-display').innerHTML = list || 'אין שיעורים היום';
  document.getElementById('screenC').setAttribute('data-has-content', list ? 'true' : 'false');
});

// רוטציה של המסכים
let current = 0;
const screens = ['screenA', 'screenSpecial', 'screenC', 'screenOmer'];
setInterval(() => {
  const nextIdx = (current + 1) % screens.length;
  const nextId = screens[nextIdx];
  const nextEl = document.getElementById(nextId);
  
  // דילוג על מסכים ריקים
  if(nextId === 'screenOmer' && nextEl.getAttribute('data-active') !== 'true') { current = nextIdx; return; }
  if((nextId === 'screenSpecial' || nextId === 'screenC') && nextEl.getAttribute('data-has-content') === 'false') { current = nextIdx; return; }

  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  nextEl.classList.add('active');
  current = nextIdx;
}, 8000);

</script>
</body>
</html>
